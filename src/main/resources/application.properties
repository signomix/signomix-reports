## OPEN TELEMTRY
#quarkus.otel.enabled=false
quarkus.otel.service.name=${SIGNOMIX_REPORTS_OTEL_NAME:signomix-reports}
quarkus.otel.exporter.otlp.endpoint=${SIGNOMIX_OTEL_ENDPOINT:http://signomix-otel-proxy:4319}
quarkus.otel.exporter.otlp.headers=${SIGNOMIX_OTEL_HEADERS}
quarkus.otel.exporter.otlp.timeout=3s
quarkus.otel.exporter.otlp.logs.timeout=3s
# quarkus.otel.exporter.otlp.protocol=http/protobuf
# quarkus.otel.exporter.otlp.traces.protocol=http/protobuf
# quarkus.otel.exporter.otlp.logs.protocol=http/protobuf
# quarkus.otel.exporter.otlp.metrics.protocol=http/pexporter.rotobuf
quarkus.otel.logs.enabled=true
#quarkus.otel.exporter.otlp.logs.endpoint=https://coroot.experiot.pl
quarkus.otel.logs.level=INFO
